<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | MovieLab</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<header>

    <section class="logo">
        <i class="fa-solid fa-film"></i>
        <span>MovieLab</span>
    </section>

    <nav>
        <a href="index.html">Início</a>
        <a href="filmes.html">Filmes</a>
        <a href="series.html">Séries</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
    </nav>

</header>

<section class="pagina-topo">

    <h1>Entre em Contato</h1>

    <p>
        Tem alguma dúvida, sugestão ou comentário? Envie uma mensagem.
    </p>

</section>

<section class="sobre-conteudo">

    <article class="bloco">

        <h2>Fale Conosco</h2>

        <form id="formulario">

            <input
            type="text"
            placeholder="Seu nome"
            required>

            <input
            type="email"
            placeholder="Seu e-mail"
            required>

            <textarea
            rows="6"
            placeholder="Digite sua mensagem"
            required></textarea>

            <button type="submit">
                Enviar Mensagem
            </button>

            <p id="mensagem-sucesso"></p>

        </form>

    </article>

</section>

<footer>

    <p>
        © 2026 MovieLab - Todos os direitos reservados
    </p>

</footer>

<script>

const formulario = document.getElementById("formulario");

formulario.addEventListener("submit", function(event){

    event.preventDefault();

    const mensagem =
    document.getElementById("mensagem-sucesso");

    mensagem.innerHTML =
    " Mensagem enviada com sucesso!";

    mensagem.style.color = "#22c55e";
    mensagem.style.fontWeight = "bold";
    mensagem.style.fontSize = "18px";
    mensagem.style.marginTop = "15px";

    formulario.reset();

});

</script>

</body>
</html>
